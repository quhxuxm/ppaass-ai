name: Build and Run Unit Tests

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  unit-test:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y curl build-essential gcc pkg-config libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace --all-targets --release

      - name: Unit Tests
        run: cargo test --workspace --lib --bins

  desktop-build:
    name: Desktop build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    defaults:
      run:
        working-directory: desktop-agent-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop-agent-ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop-agent-ui/src-tauri -> target

      - name: Install desktop dependencies
        run: npm ci

      - name: Build desktop application
        run: npm run tauri build
