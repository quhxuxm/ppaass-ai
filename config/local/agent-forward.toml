# PPAASS Desktop Agent 配置
# 该配置用于演示，包含真实 RSA 密钥

listen_addr = "127.0.0.1:7080"
proxy_addrs = ["127.0.0.1:9090", "127.0.0.1:9090"]
username = "user1"
private_key_path = "keys/user1.pem"
# quic 表示 TCP 走 TCP、UDP 走 QUIC；tcp 表示 TCP 与 UDP relay 都走 TCP。
transport_mode = "quic"
# 仅 UDP relay 使用。
quic_connection_pool_size = 4
connect_timeout_secs = 20
# Agent -> proxy 消息压缩模式：none、lz4、gzip、zstd。
# 适用于 TUN、SOCKS5、HTTP/CONNECT 中所有走 proxy 的流量。
compression_mode = "lz4"

# 日志级别：trace、debug、info、warn、error
log_level = "debug"

# 异步运行时栈的最大大小，单位 MB（默认：4 MB）
async_runtime_stack_size_mb = 4

# 文件日志目录（相比控制台输出性能更好）
# log_dir = "logs"

# 日志文件名（仅在设置 log_dir 时使用）
# log_file = "desktop-agent.log"

# Tokio 运行时工作线程数（未设置时默认使用 CPU 核心数；视频场景手动配置时建议 8）
# runtime_threads = 8

# tokio-console 默认在 6669 端口启用
# 如有需要，可设置自定义端口
# console_port = 6679

[yamux.udp]
# UDP relay 使用独立 raw Yamux 连接池；每个 UDP relay 通道会打开一个 Yamux 子流。
# sessions 是最大外层连接数，实际连接数按 UDP relay 压力逐步增长。
sessions = 5
max_streams_per_session = 32
open_stream_timeout_secs = 10
keepalive_interval_secs = 30
connection_write_timeout_secs = 300
stream_window_size_kb = 8192
