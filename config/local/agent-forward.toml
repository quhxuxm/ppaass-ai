# PPAASS Desktop Agent 配置
# 该配置用于演示，包含真实 RSA 密钥

listen_addr = "127.0.0.1:7080"
proxy_addrs = ["127.0.0.1:9090", "127.0.0.1:9090"]
username = "user1"
private_key_path = "keys/user1.pem"
tcp_pool_size = 50
udp_pool_size = 5
connect_timeout_secs = 20
# Agent -> proxy 消息压缩模式：none、lz4、gzip、zstd。
# 适用于 TUN、SOCKS5、HTTP/CONNECT 中所有走 proxy 的流量。
compression_mode = "lz4"

# TCP relay 每个方向的拷贝 buffer，单位 KB。
# 默认 256KB；大文件/高 RTT 链路通常更受益。
# 过大 buffer 会增加每条 TCP relay 的内存占用，运行时会限制在 4KB..=1MB。
tcp_relay_buffer_size_kb = 256

# 连接在池中停留的最长时间（秒），超过后将被丢弃并替换。
# 该值应小于代理端的 `pre_connect_idle_timeout_secs`（默认 120 秒），
# 使 agent 在代理关闭连接前主动替换连接。
# pool_max_connection_age_secs = 90

# 日志级别：trace、debug、info、warn、error
log_level = "debug"

# 异步运行时栈的最大大小，单位 MB（默认：4 MB）
async_runtime_stack_size_mb = 4

# 文件日志目录（相比控制台输出性能更好）
# log_dir = "logs"

# 日志文件名（仅在设置 log_dir 时使用）
# log_file = "desktop-agent.log"

# Tokio 运行时工作线程数（未设置时默认使用 CPU 核心数）
# runtime_threads = 4

# tokio-console 默认在 6669 端口启用
# 如有需要，可设置自定义端口
# console_port = 6679

[transport]
tcp_mode = "auto"
udp_mode = "auto"

[yamux.tcp]
# TCP Yamux 外层连接数。保守默认 5 条；TUN/HLS 场景下盲目增大该值会增加
# agent<->proxy 侧竞争，反而可能让单个视频分片读得更碎。
sessions = 5
max_streams_per_session = 256
open_stream_timeout_secs = 10
keepalive_interval_secs = 30
connection_write_timeout_secs = 10
stream_window_size_kb = 8192

[yamux.udp]
sessions = 5
max_streams_per_session = 256
open_stream_timeout_secs = 10
keepalive_interval_secs = 30
connection_write_timeout_secs = 10
stream_window_size_kb = 8192
