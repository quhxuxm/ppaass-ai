# PPAASS Desktop Agent 配置
# 该配置用于演示，包含真实 RSA 密钥

listen_addr = "127.0.0.1:10080"
proxy_addrs = ["140.82.30.214:80"]
# proxy_addrs = ["127.0.0.1:8080"]
username = "user1"
private_key_path = "keys/user1.pem"
tcp_pool_size = 5
udp_pool_size = 5
connect_timeout_secs = 20
# Agent -> proxy 消息压缩模式：none、lz4、gzip、zstd。
# 适用于 TUN、SOCKS5、HTTP/CONNECT 中所有走 proxy 的流量。
compression_mode = "lz4"

# 连接在池中停留的最长时间（秒），超过后将被丢弃并替换。
# 该值应小于代理端的 `pre_connect_idle_timeout_secs`（默认 120 秒），
# 使 agent 在代理关闭连接前主动替换连接。
pool_max_connection_age_secs = 90

# 日志级别：trace、debug、info、warn、error
log_level = "info"

# 异步运行时栈的最大大小，单位 MB（默认：4 MB）
async_runtime_stack_size_mb = 4

# 文件日志目录（相比控制台输出性能更好）
# log_dir = "logs"

# 日志文件名（仅在设置 log_dir 时使用）
# log_file = "desktop-agent.log"

# Tokio 运行时工作线程数（未设置时默认使用 CPU 核心数）
# runtime_threads = 4

[transport]
# TCP 传输模式：auto 优先 Yamux，失败时回退旧协议；可选 auto、yamux、legacy。
tcp_mode = "yamux"
# UDP 传输模式：UDP Yamux 与 TCP Yamux 使用独立外层 session；可选 auto、yamux、legacy。
udp_mode = "yamux"

[yamux.tcp]
# TCP Yamux 外层连接数。
sessions = 5
# 每条 TCP Yamux 外层连接允许的并发子流数。
max_streams_per_session = 256
# 打开 TCP Yamux 子流的控制面超时时间；目标连接等待使用 connect_timeout_secs/proxy 超时。
open_stream_timeout_secs = 10
# TCP Yamux keepalive 间隔；设置为 0 可关闭 keepalive。
keepalive_interval_secs = 30
# TCP Yamux 底层连接写超时。
connection_write_timeout_secs = 10
# 每个 TCP Yamux 子流的流控窗口大小。
stream_window_size_kb = 2048

[yamux.udp]
# UDP Yamux 外层连接数。
sessions = 5
# 每条 UDP Yamux 外层连接允许的并发子流数。
max_streams_per_session = 256
# 打开 UDP Yamux 子流的控制面超时时间；目标连接等待使用 connect_timeout_secs/proxy 超时。
open_stream_timeout_secs = 10
# UDP Yamux keepalive 间隔；设置为 0 可关闭 keepalive。
keepalive_interval_secs = 30
# UDP Yamux 底层连接写超时。
connection_write_timeout_secs = 10
# 每个 UDP Yamux 子流的流控窗口大小。
stream_window_size_kb = 2048


# TUN 模式配置
# ============================
# 启用后，agent 会打开 TUN 设备，并通过用户空间网络栈（netstack-smoltcp）
# 将该接口捕获的所有 IP 流量转发到代理。`listen_addr` 上的
# SOCKS5/HTTP 监听器会保持可用，便于 TUN 和手动浏览器代理并行测试。
#
# agent 启动时会自动改写系统路由表：
#   * 每个 `proxy_addrs` 条目都会通过当前默认网关安装一条 /32（或 /128）
#     旁路路由，确保代理流量不会回环进入 TUN。
#   * 添加两条指向 TUN 的 split-default 路由（0.0.0.0/1 和 128.0.0.0/1），
#     它们优先级高于现有默认路由。原默认路由不会被修改。
# 路由安装会写入一个小型状态文件，正常关闭时删除；如果进程被强杀、
# 终端异常断开或系统中止导致 guard 没有执行，下次启动 TUN 模式时会先
# 尝试按状态文件清理上次遗留的路由，再安装新的路由。
#
# 注意：创建 TUN 设备并修改路由表需要提升权限。
# macOS 默认优先连接本地特权 helper；start-agent.sh/start-agent.command
# 会在 TUN 启动前自动安装 helper，后续启停 TUN 不再需要每次输密码。
# macOS helper 不可用时默认回退到旧的 sudo 整进程提权路径；普通 SOCKS5/HTTP 模式不会提权。

[tun]
enabled = true
name = "utun8"         # Windows 如 "ppaass-tun"，macOS 如 "utun8"，Linux 如 "tun0"
ipv4 = "10.10.10.1/24"
# ipv6 = "fd00:dead:beef::1/64"
mtu = 1500
# DNS 请求交给 proxy 端默认 DNS 处理；不修改系统 DNS。
# agent 会捕获发往当前系统 DNS 的 UDP/TCP 53 流量并转给 proxy 解析。
proxy_dns = true
# Windows TUN 模式需要 wintun.dll。默认会检查 desktop-agent.exe 同目录、当前目录和 PATH；
# 也可以显式指定，例如：wintun_file = "wintun.dll"
wintun_file = "wintun.dll"
# TUN 路由状态文件名或路径。相对路径会放在当前运行目录下。
route_state_file = "tun-routes.json"
# TUN DNS 状态文件名或路径。相对路径会放在当前运行目录下。
dns_state_file = "tun-dns.json"
# macOS 使用 desktop-agent 自身的特权 helper 模式；Windows 由 start-agent.bat 创建最高权限计划任务避免重复 UAC。
macos_helper_enabled = true
macos_helper_socket = "/var/run/ppaass-ai/tun-helper.sock"
macos_helper_fallback_to_privilege = true

# 直连访问配置
#
# mode 选项：
#   "proxy_all"  - 所有流量都走代理（默认，不旁路）
#   "direct_all" - 所有流量都直连访问（不使用代理）
#   "rules"      - 使用规则列表按目标决定
#
# rules 格式（仅在 mode = "rules" 时使用）：
#   - 精确域名： "localhost", "example.com"
#   - 通配符域名： "*.local", "*.internal.company.com"
#   - 精确 IP： "127.0.0.1", "::1"
#   - CIDR 范围： "10.0.0.0/8", "192.168.0.0/16", "172.16.0.0/12"

