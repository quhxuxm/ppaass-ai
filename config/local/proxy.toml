# PPAASS Proxy 服务器配置
# 该配置用于演示，包含真实 RSA 密钥

# 监听传入 agent 连接的地址
listen_addr = "0.0.0.0:8080"

# 用户配置文件路径
users_path = "config/local/users.toml"

# 日志级别：trace、debug、info、warn、error
log_level = "info"

# 文件日志目录（相比控制台输出性能更好）
# log_dir = "logs"

# 日志文件名（仅在设置 log_dir 时使用）
# log_file = "proxy.log"

# 数据传输压缩模式：none、zstd、lz4、gzip
# - none：不压缩（默认）
# - zstd：Zstandard 压缩，速度与压缩率较均衡
# - lz4：LZ4 压缩，速度最快，压缩率较低
# - gzip：Gzip 压缩，兼容性广，速度较慢
compression_mode = "none"

# 连接目标服务器时使用的出站网络设备名。
# 不设置时使用系统默认路由；与启用 TUN 的 agent 同机运行时建议使用 "auto"，
# proxy 会绑定到原始默认路由对应的物理网卡，避免出站流量回到 TUN。
outbound_interface = "auto"

# proxy 端处理 DNS 请求时使用的上游 DNS。
# 不设置时读取系统默认 DNS（Windows 使用系统网卡 DNS，Unix 使用 /etc/resolv.conf）
# dns_upstream_addr = "8.8.8.8:53"

# Tokio 运行时工作线程数（512M 小内存实例建议 4）
runtime_threads = 4

# 防重放攻击的容忍时间，单位秒
replay_attack_tolerance = 300

# 异步运行时栈的最大大小，单位 MB（默认：2 MB）
async_runtime_stack_size_mb = 2

# 转发模式配置
# --------------------------
# 启用后，该代理会将所有流量转发到另一个 PPAASS 代理，
# 而不是直接连接目标。
# forward_mode = false

# 上游代理地址（forward_mode = true 时必填）
# upstream_proxy_addr = "127.0.0.1:9090"

# 连接上游代理时使用的认证用户名
# upstream_username = "user2"

# 连接上游代理时用于认证的私钥路径
# upstream_private_key_path = "keys/user2.pem"

# 上游代理地址列表，用于负载均衡和故障切换
# 指定多个地址时，每个连接会随机选择其中一个
# upstream_proxy_addrs = ["upstream-proxy1:8080", "upstream-proxy2:8080"]

# 上游代理连接超时时间，单位秒（默认：30 秒）
# connect_timeout_secs = 30

# 认证超时时间，单位秒；未在该时间内完成认证握手的连接会被关闭。
# 用于防止半开 TCP 连接、端口扫描器等造成僵尸连接（默认：30）。
auth_timeout_secs = 30

# Pre-connect idle 超时时间，单位秒；已认证连接若未在该时间内
# 发送第一个 Connect 请求，将被关闭（默认：120）。
# legacy relay、UDP relay 和 Yamux 外层 session 建立后不受该超时影响。
pre_connect_idle_timeout_secs = 120

# TCP relay 空闲超时时间，单位秒；建立 CONNECT 后若双向都无数据活动会关闭。
# 0 表示不限制（默认：300）
tcp_relay_idle_timeout_secs = 300

# Yamux TCP 子流空闲超时时间，单位秒；0 表示不限制。
# 512M 小内存实例建议保留 idle 回收，避免浏览器长连接长期占用子流和窗口。
yamux_tcp_relay_idle_timeout_secs = 0

# UDP relay 空闲超时时间，单位秒；UDP relay 会话与 flow 在该时间内
# 没有任何收发活动将被关闭（默认：60）
udp_relay_idle_timeout_secs = 60

# proxy 端连接保护；0 表示不限制。
# max_connections 限制所有 agent->proxy TCP 连接总数。
# max_connections_per_user 限制单个用户的 TCP 连接总数。
# max_idle_connections_per_user 限制单个用户已认证但尚未发送 Connect 的预热连接数。
# max_udp_relay_flows_per_connection 限制单条 UDP relay TCP 连接内的目标 UDP flow 数。
# max_udp_relay_flows 限制 proxy 全局 UDP relay flow 数；每个 flow 持有一个 UDP socket。
# udp_relay_channel_size 限制每个 UDP relay 内部队列最多缓存的包数量。
# max_udp_relay_buffered_bytes 限制 proxy 全局 UDP relay 队列积压 payload 字节数。
max_connections = 512
max_connections_per_user = 128
max_idle_connections_per_user = 32
max_udp_relay_flows_per_connection = 128
max_udp_relay_flows = 256
udp_relay_channel_size = 64
max_udp_relay_buffered_bytes = 16777216

[transport]
# proxy 端 legacy 表示拒绝对应 Yamux 外层连接；auto/yamux 均接受 Yamux 和旧协议。
tcp_mode = "auto"
udp_mode = "auto"

[yamux.tcp]
# proxy 端是 Yamux acceptor；如 agent 单 session 需要更高并发，可同步调大 agent/proxy。
max_streams_per_session = 128
keepalive_interval_secs = 30
connection_write_timeout_secs = 10
stream_window_size_kb = 2048

[yamux.udp]
# proxy 端是 Yamux acceptor；如 agent 单 session 需要更高并发，可同步调大 agent/proxy。
max_streams_per_session = 128
keepalive_interval_secs = 30
connection_write_timeout_secs = 10
stream_window_size_kb = 2048
