# PPAASS Proxy 服务器配置
# 该配置用于演示，包含真实 RSA 密钥

# 监听传入 agent 连接的地址
listen_addr = "0.0.0.0:80"

# 用户配置文件路径
users_path = "users.toml"

# 日志级别：trace、debug、info、warn、error
# 远端生产配置保留 warn，便于看到连接失败/带宽软上限等异常，又避免 debug/info 带来的额外 I/O。
log_level = "warn"

# 文件日志目录（相比控制台输出性能更好）
log_dir = "logs"

# 日志文件名（仅在设置 log_dir 时使用）
log_file = "proxy.log"

# 数据传输压缩模式：none、zstd、lz4、gzip
# - none：不压缩（默认）
# - zstd：Zstandard 压缩，速度与压缩率较均衡
# - lz4：LZ4 压缩，速度最快，压缩率较低
# - gzip：Gzip 压缩，兼容性广，速度较慢
compression_mode = "none"

# 连接目标服务器时使用的出站网络设备名。
# 不设置时使用系统默认路由；与启用 TUN 的 agent 同机运行时可设置为 "auto"，
# proxy 会绑定到原始默认路由对应的物理网卡，避免出站流量回到 TUN。
# outbound_interface = "auto"

# proxy 端处理 DNS 请求时使用的上游 DNS。
# 不设置时读取系统默认 DNS（Windows 使用系统网卡 DNS，Unix 使用 /etc/resolv.conf）
# dns_upstream_addr = "8.8.8.8:53"

# Tokio 运行时工作线程数。
# 视频分片会同时触发目标连接、协议编解码和 relay 任务；默认 8 更适合持续下载场景。
runtime_threads = 32

# 防重放攻击的容忍时间，单位秒
replay_attack_tolerance = 300

# 异步运行时栈的最大大小，单位 MB（默认：2 MB）
async_runtime_stack_size_mb = 4

# 转发模式配置
# --------------------------
# 启用后，该代理会将所有流量转发到另一个 PPAASS 代理，
# 而不是直接连接目标。
# forward_mode = false

# 上游代理地址（forward_mode = true 时必填）
# upstream_proxy_addr = "upstream-proxy:8080"

# 连接上游代理时使用的认证用户名
# upstream_username = "user2"

# 连接上游代理时用于认证的私钥路径
# upstream_private_key_path = "keys/user2.pem"

# 上游代理地址列表，用于负载均衡和故障切换
# 指定多个地址时，每个连接会随机选择其中一个
# upstream_proxy_addrs = ["upstream-proxy1:8080", "upstream-proxy2:8080"]

# 上游代理连接超时时间，单位秒（默认：30 秒）
# connect_timeout_secs = 30

# 认证超时时间，单位秒；未在该时间内完成认证握手的连接会被关闭。
# 用于防止半开 TCP 连接、端口扫描器等造成僵尸连接（默认：30）。
auth_timeout_secs = 30

# TCP relay 空闲超时时间，单位秒；建立 CONNECT 后若双向都无数据活动会关闭。
# 活跃下载会持续刷新计时；60 秒用于回收浏览器/模拟器残留的空闲持久连接。
tcp_relay_idle_timeout_secs = 60

# TCP relay 进入半关闭后的空闲回收时间，单位秒；agent/browser 已经关闭请求方向后，
# 若目标侧也没有继续返回数据，则更快释放持久连接。
tcp_relay_half_close_idle_timeout_secs = 30

# Yamux 外层 session 空闲超时时间，单位秒；无活跃子流时超过该时间会释放 raw TCP 连接。
yamux_session_idle_timeout_secs = 300

# UDP relay 空闲超时时间，单位秒；UDP relay 会话与 flow 在该时间内
# 没有任何收发活动将被关闭（默认：60）
udp_relay_idle_timeout_secs = 60

# UDP relay 每个内部队列最多缓存的包数量；队列满时按 UDP 语义丢包。
udp_relay_channel_size = 128

[yamux]
# proxy 端 Yamux acceptor 参数；现在只用于 UDP relay 的 raw TCP Yamux 外层连接。
max_streams_per_session = 128
keepalive_interval_secs = 30
connection_write_timeout_secs = 300
stream_window_size_kb = 8192
