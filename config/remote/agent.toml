# PPAASS Agent Configuration
# This configuration is for demo purposes with real RSA keys

listen_addr = "127.0.0.1:10080"
proxy_addrs = ["140.82.30.214:80", "140.82.30.214:80"]
username = "user1"
private_key_path = "keys/user1.pem"
pool_size = 50
connect_timeout_secs = 20

# Maximum age in seconds for a connection sitting in the pool before it is
# discarded and replaced.  This should be less than the proxy's
# `idle_connection_timeout_secs` (default 120 s) so that the agent proactively
# replaces connections before the proxy closes them.
# pool_max_connection_age_secs = 90

# Log level: trace, debug, info, warn, error
log_level = "error"

# Log directory for file-based logging (better performance than console)
log_dir = "logs"

# Log file name (used only when log_dir is set)
log_file = "agent.log"

# Maximum size of the async runtime stack in megabytes (default: 4 MB)
async_runtime_stack_size_mb = 4

# Number of Tokio runtime worker threads (defaults to CPU cores if not set)
# runtime_threads = 4

# tokio-console is enabled by default on port 6669
# Set a custom port if needed
# console_port = 6679
